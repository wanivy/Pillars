# ==================================================
#   КОНФИГ РЕЖИМА items
# ==================================================

enabled: true   # Выключает режим

# --------------------------------------------------
# Титры перед стартом игры (обратный отсчёт)
# --------------------------------------------------
start-titles:
  enabled: true

  # Последовательность титров ПЕРЕД стартом (отсчёт "3, 2, 1, Старт!")
  sequence:
    - title: "<yellow>Игра начнётся через"
      subtitle: "<gray>Приготовься"
      fade-in: 10           # тиков на появление
      stay: 40              # тиков на удержание
      fade-out: 10          # тиков на исчезновение
      delay-after: 60       # пауза перед следующим титром
      sound:
        name: "entity.experience_orb.pickup"
        volume: 1.0
        pitch: 1.0

    - title: "<yellow>3"
      subtitle: ""
      fade-in: 0
      stay: 20
      fade-out: 0
      delay-after: 20
      sound:
        name: "block.note_block.pling"
        volume: 1.0
        pitch: 0.5

    - title: "<yellow>2"
      subtitle: ""
      fade-in: 0
      stay: 20
      fade-out: 0
      delay-after: 20
      sound:
        name: "block.note_block.pling"
        volume: 1.0
        pitch: 0.7

    - title: "<yellow>1"
      subtitle: ""
      fade-in: 0
      stay: 20
      fade-out: 0
      delay-after: 20
      sound:
        name: "block.note_block.pling"
        volume: 1.0
        pitch: 1.0

    - title: "<green>Старт!"
      subtitle: "<gray>Удачи"
      fade-in: 0
      stay: 20
      fade-out: 10
      delay-after: 0
      sound:
        name: "entity.player.levelup"
        volume: 1.2
        pitch: 1.0

  # Титры ПОСЛЕ старта (показываются с задержкой, когда игра уже идёт)
  after:
    - delay-after: 40      # пауза перед показом этого блока

    - title: "<aqua>Вперёд!"
      subtitle: "<gray>Покажи всё, на что способен"
      fade-in: 10
      stay: 40
      fade-out: 20
      delay-after: 0
      sound:
        name: "entity.ender_dragon.flap"
        volume: 0.8
        pitch: 1.2

# --------------------------------------------------
# Титры окончания игры
# --------------------------------------------------
end-titles:

  # Показываются, если есть победитель
  win:
    enabled: true
    sequence:
      - title: "<gold><bold>Игра закончена!</bold></gold>"
        subtitle: "<green>Игрок %player% выиграл игру!"
        fade-in: 10
        stay: 50
        fade-out: 10
        delay-after: 70
        sound:
          name: "entity.player.levelup"
          volume: 1.2
          pitch: 1.0

      - title: "<yellow>Поздравляем!"
        subtitle: "<gray>Отличная игра, %player%!"
        fade-in: 5
        stay: 40
        fade-out: 10
        delay-after: 55
        sound:
          name: "block.note_block.chime"
          volume: 1.0
          pitch: 1.0

  # Показываются при ничьей
  draw:
    enabled: true
    sequence:
      - title: "<gray><bold>Ничья!</bold></gray>"
        subtitle: "<yellow>Игра завершилась без победителя"
        fade-in: 10
        stay: 50
        fade-out: 0
        delay-after: 60
        sound:
          name: "block.note_block.bass"
          volume: 1.0
          pitch: 1.0

      - title: "<gold>Все игроки одинаково хороши!"
        subtitle: ""
        fade-in: 5
        stay: 40
        fade-out: 10
        delay-after: 55
        sound:
          name: "block.note_block.harp"
          volume: 1.0
          pitch: 1.0

# --------------------------------------------------
# Титр при смерти игрока
# --------------------------------------------------
death-title:
  enabled: true
  sequence:
    - title: "<red><bold>Вы погибли!</bold></red>"
      subtitle: ""
      fade-in: 10
      stay: 40
      fade-out: 10
      delay-after: 0
      sound:
        name: "entity.player.hurt"
        volume: 1.0
        pitch: 1.0

# --------------------------------------------------
# Эффекты зелий, выдаваемые игрокам
# --------------------------------------------------
potion-effects:
  enabled: true
  effects:
    - type: "SLOW_FALLING"   # тип эффекта (по названию Bukkit/Paper API)
      duration: 2             # длительность в секундах
      amplifier: 1            # уровень эффекта (0 = I, 1 = II и т.д.)
      ambient: false           # мягкие частицы/полупрозрачный эффект
      particles: true          # показывать ли частицы эффекта

# --------------------------------------------------
# Прочие настройки
# --------------------------------------------------

# Плавное перемещение блоков (например, платформ)
block-move:
  enabled: true
  duration: 1.5   # длительность перемещения в секундах

random-item: true   # выдавать ли случайный предмет игроку

# Случайная команда (например, ивент/бонус)
random-command:
  enabled: false